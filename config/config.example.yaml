# Copy to config/config.yaml. Secrets live in .env, not here.

scrape:
  sites: [linkedin, indeed, glassdoor, google, zip_recruiter]
  # Search terms per target category. Pipeline runs one search per term.
  searches:
    crypto_mm:
      - "crypto market maker engineer"
      - "trading systems engineer crypto"
      - "quant developer crypto"
    broker_tech:
      - "MT5 developer"
      - "MetaTrader broker engineer"
      - "FX broker software engineer"
    eu_prop:
      - "prop trading software engineer remote"
      - "quant developer prop firm"
    africa_treasury:
      - "FX treasury analyst Africa"
      - "treasury analyst francophone"
    fintech_generalist:
      - "trading platform backend engineer"
      - "fintech python engineer remote"

  # Filtering after scrape — postings must pass ALL.
  filters:
    # Allowed location keywords (case-insensitive substring match on JD location).
    # Empty list = no location filter.
    allow_locations:
      - remote
      - london
      - paris
      - amsterdam
      - berlin
      - dublin
      - lisbon
      - madrid
      - milan
      - zurich
      - geneva
      - prague
      - warsaw
      - bucharest
      - sofia
      - cyprus
      - limassol
      - dubai
      - abu dhabi
      - singapore
      - hong kong
      - tokyo
      - johannesburg
      - cairo
      - lagos
      - nairobi
      - lomé
      - abidjan
      - dakar
      - casablanca
    # Block these — usually US-only with visa restrictions.
    deny_locations:
      - "united states only"
      - "us citizens only"
      - "us only"
    # Min/max posting age in days.
    max_age_days: 14
    # Soft block — keywords that strongly indicate US-only roles.
    deny_keywords_in_jd:
      - "must be us citizen"
      - "us work authorization required"
      - "no visa sponsorship"

  results_per_search: 25
  hours_old: 336  # 14 days

score:
  model: "claude-sonnet-4-6"
  # Top-N to draft per pipeline run.
  draft_top_n: 15
  # Minimum fit score (0-100) to include.
  min_score: 60

draft:
  model: "claude-sonnet-4-6"
  output_dir: "queue"
  # Resume length target (bullets per role).
  bullets_per_role_target: 4
  # Cover letter length target (words).
  cover_letter_words: 250

tracker:
  csv_path: "tracker/live.csv"
  schema_path: "tracker/schema.md"
